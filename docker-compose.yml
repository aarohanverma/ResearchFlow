# ResearchFlow local development stack
# Swap to Azure equivalents by setting env vars — zero code changes.

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: researchflow
      POSTGRES_USER: researchflow
      POSTGRES_PASSWORD: researchflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U researchflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Official arXiv MCP server (stdio). Pinned for parity with the in-process
  # `arxiv-mcp-server` pip dep installed in the backend image. Kept alive as
  # a sidecar so `docker compose run arxiv-mcp ...` works for ad-hoc CLI use;
  # the backend itself spawns a local subprocess (no socket bridge needed).
  arxiv-mcp:
    image: mcp/arxiv-mcp-server:latest
    restart: unless-stopped
    entrypoint: ["sleep", "infinity"]
    volumes:
      - arxiv_papers:/data/papers
    environment:
      ARXIV_STORAGE_PATH: /data/papers

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env.local
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      arxiv-mcp:
        condition: service_started
    volumes:
      - ./backend:/app
      - blobcache:/var/cache/researchflow
      - arxiv_papers:/data/papers
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env.local
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

volumes:
  pgdata:
  redisdata:
  blobcache:
  arxiv_papers:
